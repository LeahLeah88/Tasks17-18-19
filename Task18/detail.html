<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task17 Detail Mock</title>
    <link rel="stylesheet" href="detail.css" />
</head>
<body>
    <main class="stage">
        <section class="phone">
            <div class="frame">
                <div class="notch"></div>
                <div class="screen">
                    <header class="status-bar">
                        <span>9:41</span>
                        <span>5G 87%</span>
                    </header>

                    <section class="content">
                        <h1>Character Details</h1>

                        <article class="character-card">
                            <h2>Rick Sanchez</h2>
                            <p>Alive • Human</p>
                        </article>

                        <p class="hint">Tap on card to expand/collapse</p>
                        <p class="detail-text">
                            Scientist from Earth (C-137). This block appears in expanded
                            state via MotionLayout.
                        </p>
                    </section>

                    <nav class="bottom-nav">
                        <button class="nav-item" type="button">
                            <span class="icon icon-filter"></span>
                            <span>Filter</span>
                        </button>
                        <button class="nav-item" type="button">
                            <span class="icon icon-list"></span>
                            <span>List</span>
                        </button>
                        <button class="nav-item nav-item--active" type="button">
                            <span class="icon icon-details"></span>
                            <span>Details</span>
                        </button>
                    </nav>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
