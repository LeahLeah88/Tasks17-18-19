<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task17 Android UI Mock</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="stage">
        <section class="phone">
            <div class="frame">
                <div class="notch"></div>

                <div class="screen">
                    <header class="status-bar">
                        <span>9:41</span>
                        <span>5G 87%</span>
                    </header>

                    <section class="content">
                        <h1>Screen 1: Filter/Favorites</h1>
                        <p>Search and filter for characters will be here.</p>
                    </section>

                    <nav class="bottom-nav">
                        <button class="nav-item nav-item--active" type="button">
                            <span class="icon icon-filter"></span>
                            <span>Filter</span>
                        </button>
                        <button class="nav-item" type="button">
                            <span class="icon icon-list"></span>
                            <span>List</span>
                        </button>
                        <button class="nav-item" type="button">
                            <span class="icon icon-details"></span>
                            <span>Details</span>
                        </button>
                    </nav>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
